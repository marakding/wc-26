<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07080a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WC26">
<title>WC26</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg-0: #07080a;
  --bg-1: #0d0f12;
  --bg-2: #14171c;
  --bg-3: #1c2028;
  --bg-4: #262b35;
  --line: #22262f;
  --line-strong: #30363f;
  --ink-0: #f5f6f8;
  --ink-1: #c8ccd3;
  --ink-2: #8b919c;
  --ink-3: #545a66;
  --acc-red: oklch(0.62 0.22 25);
  --acc-red-d: oklch(0.38 0.14 25);
  --acc-grn: oklch(0.72 0.19 150);
  --acc-grn-d: oklch(0.38 0.12 150);
  --f-mono: 'JetBrains Mono', ui-monospace, monospace;
  --f-sans: 'Space Grotesk', system-ui, sans-serif;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg-1); color: var(--ink-0); height: 100%; }
body { font-family: var(--f-sans); -webkit-font-smoothing: antialiased; overflow: hidden; }
#root { height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }
::-webkit-scrollbar { width: 0; height: 0; }
scrollbar-width: none;

@keyframes live-pulse {
  0%, 100% { box-shadow: 0 0 0 0 color-mix(in oklch, var(--acc-red) 70%, transparent); }
  50% { box-shadow: 0 0 0 5px color-mix(in oklch, var(--acc-red) 0%, transparent); }
}
@keyframes screen-in {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }

.screen-enter { animation: screen-in .32s ease-out; }
.mono { font-family: var(--f-mono); font-variant-numeric: tabular-nums; }
.chunky { font-family: var(--f-mono); font-weight: 700; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
.caps { text-transform: uppercase; letter-spacing: 0.08em; }

.live-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--acc-red); flex-shrink: 0;
  animation: live-pulse 1.6s ease-out infinite;
  display: inline-block;
}

.screen-scroll {
  overflow-y: auto; overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex: 1;
  padding-bottom: calc(72px + var(--safe-bottom));
}
.screen-scroll::-webkit-scrollbar { display: none; }

/* Bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: var(--bg-0);
  border-top: 1px solid var(--line-strong);
  padding-bottom: var(--safe-bottom);
}
.nav-tick-strip { display: flex; height: 3px; }
.nav-tick { flex: 1; transition: background .2s ease; }
.nav-tabs { display: flex; padding: 6px 0 8px; }
.nav-btn {
  flex: 1; background: none; border: none;
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px 0;
}
.nav-label {
  font-family: var(--f-mono); font-size: 8px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
}
.nav-idx {
  font-family: var(--f-mono); font-size: 7px;
  letter-spacing: 0.1em;
}

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
  animation: fadeIn .2s ease;
}
.modal {
  background: var(--bg-2); border: 1px solid var(--line-strong);
  width: 100%; max-width: 380px; padding: 28px 22px;
  animation: screen-in .3s ease-out;
}
.modal h2 { font-family: var(--f-mono); font-weight: 700; font-size: 22px; letter-spacing: -0.03em; margin-bottom: 6px; }
.modal p { font-size: 14px; color: var(--ink-2); margin-bottom: 20px; line-height: 1.6; }
.text-input {
  width: 100%; background: var(--bg-3); border: 1px solid var(--line-strong);
  color: var(--ink-0); font-family: var(--f-mono); font-size: 15px;
  padding: 11px 12px; outline: none; margin-bottom: 10px;
  transition: border-color .2s;
}
.text-input:focus { border-color: var(--acc-red); }
.btn-primary {
  width: 100%; background: var(--acc-red); color: #fff;
  border: none; font-family: var(--f-mono); font-weight: 700;
  font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 12px; cursor: pointer; transition: opacity .15s;
}
.btn-primary:hover { opacity: .85; }
.btn-primary:disabled { opacity: .4; cursor: default; }
.btn-ghost {
  background: none; border: 1px solid var(--line-strong);
  color: var(--ink-1); font-family: var(--f-mono); font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase;
  padding: 5px 10px; cursor: pointer; transition: border-color .15s;
}
.btn-ghost:hover { border-color: var(--ink-2); }

/* Spinner */
.spinner {
  width: 24px; height: 24px; border: 2px solid var(--line-strong);
  border-top-color: var(--acc-red); border-radius: 50%;
  animation: spin .7s linear infinite; margin: 40px auto;
}

/* Toasts */
.toast {
  position: fixed; top: calc(var(--safe-top) + 60px); left: 50%;
  transform: translateX(-50%);
  background: var(--acc-grn); color: #000;
  font-family: var(--f-mono); font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; padding: 8px 18px; z-index: 200;
  animation: fadeIn .2s ease;
  white-space: nowrap;
}
</style>
</head>

}

async function fetchCommentary(matchContext, factType, phase) {
  const r = await fetch(`${WORKER_URL}/commentary`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ matchContext, factType, phase }),
  });
  const d = await r.json();
  return d.commentary || null;
}

async function fetchH2H(team1Id, team2Id) {
  try {
    const url = `https://v3.football.api-sports.io/fixtures/headtohead?h2h=${team1Id}-${team2Id}&last=20`;
    const r = await fetch(`${WORKER_URL}/h2h?url=${encodeURIComponent(url)}`);
    const d = await r.json();
    const fixtures = d.response || [];
    const home_wins = fixtures.filter(f =>
      f.teams.home.id === team1Id && f.goals.home > f.goals.away ||
      f.teams.away.id === team1Id && f.goals.away > f.goals.home
    ).length;
    const away_wins = fixtures.filter(f =>
      f.teams.home.id === team2Id && f.goals.home > f.goals.away ||
      f.teams.away.id === team2Id && f.goals.away > f.goals.home
    ).length;
    const draws = fixtures.filter(f => f.goals.home === f.goals.away).length;
    return { home_wins, away_wins, draws, total: fixtures.length };
  } catch(e) { return null; }
}

// Hook that manages the commentator queue for a match
function useCommentator(match, matchDetail, isLive) {
  const [queue, setQueue] = useState([]);   // facts waiting to show
  const [current, setCurrent] = useState(null); // fact currently showing
  const [shown, setShown] = useState(new Set()); // which factTypes shown
  const [dismissed, setDismissed] = useState(false);
  const timerRef = useRef(null);
  const elapsed = match?.fixture?.status?.elapsed || 0;

  // Pick a random commentator
  // Alternate who starts based on match id — balances across the tournament
  const startIndex = match ? match.fixture.id % 2 : 0;
  const commentatorIndex = useRef(startIndex);
  const pickCommentator = () => {
    const c = COMMENTATORS[commentatorIndex.current % COMMENTATORS.length];
    commentatorIndex.current += 1;
    return c;
  };

  const showNext = useCallback((items) => {
    if (!items || items.length === 0) return;
    const [first, ...rest] = items;
    setCurrent(first);
    setDismissed(false);
    // Auto-dismiss after 12 seconds, then show next
    timerRef.current = setTimeout(() => {
      setCurrent(null);
      if (rest.length > 0) {
        setTimeout(() => showNext(rest), 2000);
      }
    }, 12000);
  }, []);

  // Opening facts: trigger in first 5 minutes
  useEffect(() => {
    if (!isLive || !match || shown.has('opening')) return;
    if (elapsed < 1 || elapsed > 5) return;

    setShown(s => new Set([...s, 'opening']));

    const ctx = {
      homeTeam: match.teams.home.name,
      awayTeam: match.teams.away.name,
      venue: match.fixture.venue?.name || 'the stadium',
      city: match.fixture.venue?.city || '',
      elapsed,
      score: `${match.goals.home ?? 0}-${match.goals.away ?? 0}`,
    };

    // Fetch H2H in parallel
    fetchH2H(match.teams.home.id, match.teams.away.id).then(h2h => {
      const ctxWithH2H = { ...ctx, h2h };

      // Queue up 3 facts
      const factTypes = ['stadium', 'h2h', 'player'];
      const promises = factTypes.map(ft =>
        fetchCommentary(ctxWithH2H, ft, 'opening').then(text => ({
          text,
          factType: ft,
          commentator: pickCommentator(),
          phase: 'opening',
        }))
      );

      Promise.all(promises).then(facts => {
        const valid = facts.filter(f => f.text);
        setQueue(valid);
        if (valid.length > 0) showNext(valid);
      });
    });
  }, [elapsed, isLive, match]);

  // Halftime facts: trigger at minute 46-50
  useEffect(() => {
    if (!isLive || !match || shown.has('halftime')) return;
    if (elapsed < 46 || elapsed > 52) return;
    if (!matchDetail?.stats) return;

    setShown(s => new Set([...s, 'halftime']));

    const getStat = (side, type) => {
      const teamId = side === 'H' ? match.teams.home.id : match.teams.away.id;
      const ts = matchDetail.stats.find(s => s.team.id === teamId)?.statistics || [];
      return ts.find(x => x.type === type)?.value ?? '?';
    };

    const ctx = {
      homeTeam: match.teams.home.name,
      awayTeam: match.teams.away.name,
      venue: match.fixture.venue?.name || 'the stadium',
      city: match.fixture.venue?.city || '',
      elapsed,
      score: `${match.goals.home ?? 0}-${match.goals.away ?? 0}`,
      stats: {
        homePossession: getStat('H', 'Ball Possession'),
        awayPossession: getStat('A', 'Ball Possession'),
        homeShots: getStat('H', 'Total Shots'),
        awayShots: getStat('A', 'Total Shots'),
        homeShotsOnTarget: getStat('H', 'Shots on Goal'),
        awayShotsOnTarget: getStat('A', 'Shots on Goal'),
      },
    };

    const factTypes = ['possession', 'pattern'];
    const promises = factTypes.map(ft =>
      fetchCommentary(ctx, ft, 'halftime').then(text => ({
        text,
        factType: ft,
        commentator: pickCommentator(),
        phase: 'halftime',
      }))
    );

    Promise.all(promises).then(facts => {
      const valid = facts.filter(f => f.text);
      if (valid.length > 0) showNext(valid);
    });
  }, [elapsed, isLive, match, matchDetail]);

  const dismiss = useCallback(() => {
    if (timerRef.current) clearTimeout(timerRef.current);
    setCurrent(null);
    setDismissed(true);
  }, []);

  useEffect(() => () => { if (timerRef.current) clearTimeout(timerRef.current); }, []);

  return { current, dismiss };
}

// The visual card component

  const { commentator, text, phase, factType } = card;
  const label = phase === 'halftime'
    ? factType === 'possession' ? 'HALF TIME STATS' : 'SECOND HALF PREVIEW'

  return (

        }}>
          <img src={commentator.img}
            style={{width: 72, height: 80, objectFit: 'cover', objectPosition: 'top'}}

        </div>

        {/* Content */}
        <div style={{flex: 1, padding: '10px 12px 10px 10px', minWidth: 0}}>
          <div style={{display: 'flex', alignItems: 'center',
            justifyContent: 'space-between', marginBottom: 6}}>
            <div style={{display: 'flex', alignItems: 'center', gap: 6}}>
              <span className="mono caps" style={{fontSize: 9,
                color: commentator.color, fontWeight: 700, letterSpacing: '0.14em'}}>
                {commentator.name}
              </span>

              <span className="mono caps" style={{fontSize: 9,
                color: 'var(--ink-3)', letterSpacing: '0.12em'}}>{label}</span>

          </div>
        </div>
      </div>
    </div>
  );
}

function TickerCard({ m, idx, total, onTap }) {
  const isLive = isLiveStatus(m.fixture.status.short);
  const isFT = isFTStatus(m.fixture.status.short);
  const hCode = teamCode(m.teams.home.name);
  const aCode = teamCode(m.teams.away.name);
  return (
    <div onClick={() => onTap(m)}
      style={{minWidth:280,flexShrink:0,scrollSnapAlign:'start',
        padding:'8px 16px 22px',
        borderRight:'1px dashed var(--line-strong)',
        position:'relative',cursor:'pointer'}}>
      <div className="mono" style={{position:'absolute',top:8,right:16,
        fontSize:9,color:'var(--ink-3)',letterSpacing:'0.15em'}}>
        {String(idx+1).padStart(2,'0')}/{String(total).padStart(2,'0')}
      </div>
      <div style={{marginBottom:12}}>
        {isLive
          ? <LiveTag min={m.fixture.status.elapsed}/>
          : isFT
          ? <StatusTag status={m.fixture.status.short}/>
          : <StatusTag status="UP" time={`${fmtDateShort(m.fixture.date)} · ${fmtKO(m.fixture.date)}`}/>}
      </div>
      <TickerTeamRow code={hCode} name={m.teams.home.name}
        score={m.goals.home} showScore={isLive||isFT}
        leading={isLive && m.goals.home > m.goals.away}/>
      <div style={{height:8}}/>
      <TickerTeamRow code={aCode} name={m.teams.away.name}
        score={m.goals.away} showScore={isLive||isFT}
        leading={isLive && m.goals.away > m.goals.home}/>
      <div className="mono" style={{marginTop:14,fontSize:10,
        color:'var(--ink-3)',letterSpacing:'0.05em'}}>
        {m.league.round?.replace('Group Stage - ','GS ') || ''} · {m.fixture.venue?.city || ''}
      </div>
    </div>
  );
}

function TickerTeamRow({ code, name, score, showScore, leading }) {
  return (
    <div style={{display:'flex',alignItems:'center',gap:12}}>
      <TeamBlock code={code} size={32}/>
      <div style={{flex:1,minWidth:0}}>

          {name.toUpperCase()}

          letterSpacing:'0.1em',marginTop:3}}>
          {fmtDateShort(m.fixture.date)}
        </div>
        <div className="mono" style={{fontSize:9,color:'var(--ink-3)',marginTop:2}}>
          {m.league.round?.replace('Group Stage - ','GS ')?.replace('Group Stage','GS') || ''}
        </div>
      </div>
      <div>
        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:6}}>
          <TeamBlock code={hCode} size={20}/>
          <span className="mono" style={{fontSize:13,fontWeight:700}}>{hCode}</span>
          <span className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>
            {m.teams.home.name}
          </span>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <TeamBlock code={aCode} size={20}/>
          <span className="mono" style={{fontSize:13,fontWeight:700}}>{aCode}</span>
          <span className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>
            {m.teams.away.name}
          </span>

      </div>

function ResultRow({ m, onTap }) {
  const hCode = teamCode(m.teams.home.name);
  const aCode = teamCode(m.teams.away.name);
  const hWon = m.goals.home > m.goals.away;
  const aWon = m.goals.away > m.goals.home;
  return (
    <div onClick={() => onTap(m)}
      style={{display:'flex',alignItems:'center',gap:10,
        padding:'10px 0',borderTop:'1px solid var(--line)',cursor:'pointer'}}>
      <TeamBlock code={hCode} size={24}/>
      <span className="mono" style={{fontSize:12,fontWeight:700,width:34,
        color:hWon?'var(--ink-0)':'var(--ink-2)'}}>{hCode}</span>
      <div className="chunky" style={{fontSize:20,color:'var(--ink-0)',
        flex:1,textAlign:'center',letterSpacing:'0.05em'}}>
        {m.goals.home ?? 0}–{m.goals.away ?? 0}
      </div>
      <span className="mono" style={{fontSize:12,fontWeight:700,width:34,
        textAlign:'right',color:aWon?'var(--ink-0)':'var(--ink-2)'}}>{aCode}</span>
      <TeamBlock code={aCode} size={24}/>
      <span className="mono caps" style={{fontSize:9,color:'var(--ink-3)',
        border:'1px solid var(--line-strong)',padding:'2px 6px',marginLeft:4,
        letterSpacing:'0.1em'}}>FT</span>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// MATCH DETAIL SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function MatchDetailScreen({ match: m, onBack }) {
  const [tab, setTab] = useState('EVENTS');
  const [detail, setDetail] = useState(null);
  const [loading, setLoading] = useState(true);
  const { current: commentatorCard, dismiss: dismissCard } = useCommentator(m, detail, isLive);
  const hCode = teamCode(m.teams.home.name);
  const aCode = teamCode(m.teams.away.name);
  const isLive = isLiveStatus(m.fixture.status.short);
  const isFT = isFTStatus(m.fixture.status.short);
  const elapsed = m.fixture.status.elapsed || 0;
  const pct = Math.min((elapsed/90)*100, 100);

  useEffect(() => {
    fetchMatchDetail(m.fixture.id).then(d => {
      setDetail(d); setLoading(false);
    }).catch(() => setLoading(false));
  }, [m.fixture.id]);

  const getStat = (side, type) => {
    if (!detail?.stats) return '0';
    const teamId = side === 'H' ? m.teams.home.id : m.teams.away.id;
    const ts = detail.stats.find(s => s.team.id === teamId)?.statistics || [];
    return ts.find(x => x.type === type)?.value ?? '0';
  };

  const STAT_ROWS = [
    {label:'POSSESSION', type:'Ball Possession', unit:'%'},
    {label:'SHOTS', type:'Total Shots'},
    {label:'ON TARGET', type:'Shots on Goal'},
    {label:'CORNERS', type:'Corner Kicks'},
    {label:'YELLOW', type:'Yellow Cards'},
    {label:'FOULS', type:'Fouls'},
  ];

  const hLineup = detail?.lineups?.find(l => l.team.id === m.teams.home.id)?.startXI || [];
  const aLineup = detail?.lineups?.find(l => l.team.id === m.teams.away.id)?.startXI || [];
  const events = detail?.events || [];

  return (
    <div className="screen-enter screen-scroll">
      {/* Header */}
      <div style={{padding:`calc(var(--safe-top) + 12px) 16px 10px`,
        borderBottom:'1px solid var(--line)',background:'var(--bg-1)',
        display:'flex',alignItems:'center',justifyContent:'space-between',
        position:'sticky',top:0,zIndex:20}}>
        <button onClick={onBack} className="btn-ghost">← BACK</button>
        <div className="mono caps" style={{fontSize:10,color:'var(--ink-2)',letterSpacing:'0.14em'}}>
          MATCH · {m.league.round?.replace('Group Stage - ','GS ') || ''}
        </div>
        <div style={{width:60}}/>
      </div>

      {/* Scoreboard */}
      <div style={{background:'var(--bg-0)',borderBottom:'1px solid var(--line)',
        padding:'16px 16px 20px',position:'relative'}}>
        {/* Grid overlay for live */}
        {isLive && <div style={{position:'absolute',inset:0,opacity:0.06,
          backgroundImage:'linear-gradient(var(--ink-1) 1px, transparent 1px), linear-gradient(90deg, var(--ink-1) 1px, transparent 1px)',
          backgroundSize:'24px 24px',pointerEvents:'none'}}/>}

        <div style={{display:'flex',justifyContent:'space-between',marginBottom:16,position:'relative'}}>
          {isLive ? <LiveTag min={m.fixture.status.elapsed}/> : <StatusTag status={m.fixture.status.short}/>}
          <span className="mono" style={{fontSize:10,color:'var(--ink-3)'}}>
            {m.fixture.venue?.city || ''}
          </span>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',
          alignItems:'center',gap:8,position:'relative'}}>
          <div style={{textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
              <TeamBlock code={hCode} size={56}/>
            </div>
            <div className="chunky" style={{fontSize:20,color:'var(--ink-0)'}}>{hCode}</div>
            <div className="mono" style={{fontSize:9,color:'var(--ink-2)',marginTop:2}}>
              {m.teams.home.name.toUpperCase()}
            </div>
          </div>
          <div style={{textAlign:'center',padding:'0 4px'}}>
            <div className="chunky" style={{fontSize:66,lineHeight:1,color:'var(--ink-0)',
              fontFeatureSettings:'"tnum"'}}>
              {m.goals.home ?? 0}
              <span style={{color:'var(--ink-3)',margin:'0 4px',fontSize:50}}>:</span>
              {m.goals.away ?? 0}
            </div>
            {m.score?.halftime?.home != null && (
              <div className="mono" style={{fontSize:9,color:'var(--ink-3)',marginTop:4,letterSpacing:'0.12em'}}>
                HT {m.score.halftime.home}–{m.score.halftime.away}
              </div>
            )}
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{display:'flex',justifyContent:'center',marginBottom:8}}>
              <TeamBlock code={aCode} size={56}/>
            </div>
            <div className="chunky" style={{fontSize:20,color:'var(--ink-0)'}}>{aCode}</div>
            <div className="mono" style={{fontSize:9,color:'var(--ink-2)',marginTop:2}}>
              {m.teams.away.name.toUpperCase()}
            </div>
          </div>
        </div>

        {/* Minute timeline */}
        {(isLive || isFT) && (
          <div style={{marginTop:20,position:'relative'}}>
            <div style={{height:20,border:'1px solid var(--line-strong)',position:'relative',overflow:'hidden'}}>
              <div style={{position:'absolute',inset:0,width:`${isFT?100:pct}%`,
                background:'color-mix(in oklch, var(--acc-red) 20%, transparent)'}}/>
              {!isFT && <div style={{position:'absolute',top:0,bottom:0,left:`${pct}%`,
                width:0,borderLeft:'2px solid var(--ink-0)'}}/>}
              <div style={{position:'absolute',top:'50%',left:'50%',
                transform:'translate(-50%,-50%)',
                fontFamily:'var(--f-mono)',fontSize:9,color:'var(--ink-2)',letterSpacing:'0.18em'}}>
                HT
              </div>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',
              fontFamily:'var(--f-mono)',fontSize:9,color:'var(--ink-3)',
              marginTop:3,letterSpacing:'0.1em'}}>
              <span>00'</span><span>45'</span>
              {isLive && <span style={{color:'var(--acc-red)'}}>{elapsed}'</span>}
              <span>90'</span>
            </div>
          </div>
        )}
      </div>

      {/* Tab strip */}
      <div style={{display:'flex',borderBottom:'1px solid var(--line)',
        background:'var(--bg-1)',position:'sticky',top:44+parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--safe-top')||'0'),zIndex:19}}>
        {['EVENTS','STATS','LINEUPS'].map(t => (
          <button key={t} onClick={() => setTab(t)}
            className="mono caps"
            style={{flex:1,background:'none',border:'none',
              borderBottom: tab===t ? '2px solid var(--acc-red)' : '2px solid transparent',
              color:tab===t?'var(--ink-0)':'var(--ink-2)',
              padding:'12px 0',fontSize:10,letterSpacing:'0.14em',
              fontWeight:tab===t?700:500,cursor:'pointer',
              transition:'color .15s'}}>
            {t}
          </button>
        ))}
      </div>

      {loading && <div className="spinner"/>}

      {!loading && tab === 'EVENTS' && (
        <div style={{padding:'0 16px'}}>
          {events.length === 0 && (
            <div style={{padding:'30px 0',textAlign:'center',
              fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-3)',letterSpacing:'0.1em'}}>
              NO EVENTS RECORDED
            </div>
          )}
          {[...events].reverse().map((ev,i) => {
            const isGoal = ev.type === 'Goal';
            const isYellow = ev.detail === 'Yellow Card';
            const isRed = ev.detail === 'Red Card';
            const side = ev.team.id === m.teams.home.id ? hCode : aCode;
            return (
              <div key={i} style={{display:'grid',gridTemplateColumns:'36px 1fr auto',
                gap:10,alignItems:'center',padding:'10px 0',
                borderTop:'1px solid var(--line)'}}>
                <span className="mono" style={{fontSize:11,color:'var(--ink-1)',fontWeight:700}}>
                  {ev.time.elapsed}'
                </span>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span className="mono caps" style={{fontSize:9,letterSpacing:'0.14em',
                    fontWeight:700,padding:'2px 6px',
                    background:isGoal?'var(--acc-grn-d)':isYellow?'oklch(0.45 0.13 85)':isRed?'var(--acc-red-d)':'var(--bg-3)',
                    color:'#fff'}}>
                    {isGoal?'GOAL':isYellow?'YEL':isRed?'RED':ev.type.toUpperCase().slice(0,4)}
                  </span>
                  <span className="mono" style={{fontSize:12,color:'var(--ink-0)'}}>
                    {ev.player?.name}
                  </span>
                </div>
                <span className="mono" style={{fontSize:11,color:'var(--ink-3)'}}>{side}</span>
              </div>
            );
          })}
        </div>
      )}

      {!loading && tab === 'STATS' && detail?.stats && (
        <div style={{padding:'8px 16px'}}>
          <div style={{display:'flex',justifyContent:'space-between',
            padding:'8px 0 12px',borderBottom:'1px solid var(--line)'}}>
            <span className="mono" style={{fontSize:12,fontWeight:700}}>{hCode}</span>
            <span className="mono caps" style={{fontSize:10,color:'var(--ink-3)',letterSpacing:'0.14em'}}>STAT</span>
            <span className="mono" style={{fontSize:12,color:'var(--ink-2)'}}>{aCode}</span>
          </div>
          {STAT_ROWS.map(row => {
            const hv = getStat('H', row.type);
            const av = getStat('A', row.type);
            const hn = parseFloat(String(hv).replace('%','')) || 0;
            const an = parseFloat(String(av).replace('%','')) || 0;
            const total = hn + an || 1;
            return (
              <div key={row.type} style={{padding:'10px 0',borderBottom:'1px dashed var(--line)'}}>
                <div style={{display:'flex',justifyContent:'space-between',
                  alignItems:'baseline',marginBottom:6}}>
                  <span className="mono" style={{fontSize:13,fontWeight:700}}>{hv}</span>
                  <span className="mono caps" style={{fontSize:9,color:'var(--ink-2)',letterSpacing:'0.14em'}}>
                    {row.label}
                  </span>
                  <span className="mono" style={{fontSize:13,color:'var(--ink-2)'}}>{av}</span>
                </div>
                <div style={{display:'flex',height:3,background:'var(--bg-3)'}}>
                  <div style={{width:`${(hn/total)*100}%`,background:'var(--acc-red)'}}/>
                  <div style={{flex:1,background:'var(--acc-grn-d)'}}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {!loading && tab === 'LINEUPS' && (
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:0,
          borderTop:'1px solid var(--line)'}}>
          {[{code:hCode, lineup:hLineup, name:m.teams.home.name},
            {code:aCode, lineup:aLineup, name:m.teams.away.name}].map(({code,lineup,name},si) => (
            <div key={code} style={{borderRight:si===0?'1px solid var(--line)':'none'}}>
              <div style={{padding:'10px 12px',borderBottom:'1px solid var(--line)',
                display:'flex',alignItems:'center',gap:8}}>
                <TeamBlock code={code} size={20}/>
                <span className="mono" style={{fontSize:12,fontWeight:700}}>{code}</span>
              </div>
              {lineup.map((p,i) => (
                <div key={i} style={{display:'flex',gap:8,alignItems:'center',
                  padding:'7px 12px',
                  borderBottom:'1px dashed var(--line)',fontSize:11}}>
                  <span className="mono" style={{width:18,color:'var(--ink-3)',
                    fontWeight:700,textAlign:'center'}}>{p.player.number}</span>
                  <span style={{color:'var(--ink-1)',fontSize:11}}>{p.player.name}</span>
                </div>
              ))}
              {lineup.length === 0 && (
                <div style={{padding:'20px 12px',fontFamily:'var(--f-mono)',
                  fontSize:10,color:'var(--ink-3)',letterSpacing:'0.1em'}}>
                  NOT YET<br/>AVAILABLE
                </div>
              )}
            </div>
          ))}
        </div>
      )}

      <div style={{height:16}}/>
    </div>

    {/* Commentator card overlay */}
    {commentatorCard && (
      <CommentatorCard card={commentatorCard} onDismiss={dismissCard}/>
    )}
  );
}

// STANDINGS SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function StandingsScreen() {
  const [standings, setStandings] = useState({});
  const [active, setActive] = useState('A');
  const [loading, setLoading] = useState(true);
  const groups = ['A','B','C','D','E','F','G','H','I','J','K','L'];

  useEffect(() => {
    fetchStandings().then(s => { setStandings(s); setLoading(false); })
      .catch(() => setLoading(false));
  }, []);

  const grp = standings[active] || [];

  return (
    <div className="screen-enter screen-scroll">
      {/* Header */}
      <div style={{padding:`calc(var(--safe-top) + 16px) 16px 12px`,
        borderBottom:'1px solid var(--line)',background:'var(--bg-1)',
        position:'sticky',top:0,zIndex:20}}>
        <div className="mono caps" style={{fontSize:9,color:'var(--ink-3)',
          letterSpacing:'0.18em'}}>
          GROUP STAGE · 12 GROUPS · TOP 2 + BEST 8 THIRDS
        </div>
        <div className="chunky" style={{fontSize:28,marginTop:4,letterSpacing:'-0.04em'}}>
          STANDINGS
        </div>
      </div>

      {/* Group picker */}
      <div style={{display:'flex',overflowX:'auto',borderBottom:'1px solid var(--line)',
        scrollbarWidth:'none',position:'sticky',
        top:64,zIndex:19,background:'var(--bg-1)'}}>
        {groups.map(g => (
          <button key={g} onClick={() => setActive(g)}
            className="mono"
            style={{flexShrink:0,minWidth:52,padding:'13px 0',
              background:'none',border:'none',
              borderRight:'1px solid var(--line)',
              borderBottom:active===g?'2px solid var(--acc-red)':'2px solid transparent',
              color:active===g?'var(--ink-0)':'var(--ink-2)',
              fontSize:11,fontWeight:active===g?700:500,
              cursor:'pointer',letterSpacing:'0.05em',
              transition:'color .15s'}}>
            GR.{g}
          </button>
        ))}
      </div>

      {loading && <div className="spinner"/>}

      {!loading && (
        <>
          <div style={{padding:'14px 16px 10px'}}>
            <div className="chunky" style={{fontSize:22}}>GROUP {active}</div>
            <div className="mono caps" style={{fontSize:9,color:'var(--ink-3)',
              letterSpacing:'0.14em',marginTop:3}}>
              UPDATED LIVE · {SEASON}
            </div>
          </div>

          <div style={{padding:'0 16px'}}>
            <HudCorners style={{background:'var(--bg-2)'}}>
              {/* Column header */}
              <div style={{display:'grid',
                gridTemplateColumns:'22px 26px 1fr 24px 24px 24px 24px 36px 32px',
                gap:3,alignItems:'center',padding:'8px 10px',
                fontFamily:'var(--f-mono)',fontSize:9,color:'var(--ink-3)',
                letterSpacing:'0.1em',borderBottom:'1px solid var(--line-strong)'}}>
                <span>#</span><span/>
                <span>TEAM</span>
                <span style={{textAlign:'center'}}>P</span>
                <span style={{textAlign:'center'}}>W</span>
                <span style={{textAlign:'center'}}>D</span>
                <span style={{textAlign:'center'}}>L</span>
                <span style={{textAlign:'center'}}>GD</span>
                <span style={{textAlign:'right'}}>PTS</span>
              </div>

              {grp.length === 0 && (
                <div style={{padding:'24px',textAlign:'center',
                  fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-3)',letterSpacing:'0.1em'}}>
                  NO DATA FOR GROUP {active}
                </div>
              )}

              {grp.map((row,i) => {
                const zone = i < 2 ? 'qualify' : i === 2 ? 'playoff' : 'out';
                const zc = zone==='qualify'?'var(--acc-grn)':zone==='playoff'?'oklch(0.72 0.14 85)':'var(--ink-3)';
                const gd = (row.goalsDiff || 0);
                const code = teamCode(row.team.name);
                return (
                  <div key={row.team.id} style={{
                    display:'grid',
                    gridTemplateColumns:'22px 26px 1fr 24px 24px 24px 24px 36px 32px',
                    gap:3,alignItems:'center',padding:'12px 10px',
                    borderBottom:i<grp.length-1?'1px dashed var(--line)':'none',
                    position:'relative'}}>
                    <div style={{position:'absolute',left:0,top:0,bottom:0,
                      width:2,background:zc}}/>
                    <span className="mono" style={{fontSize:11,fontWeight:700,color:zc}}>
                      {String(i+1).padStart(2,'0')}
                    </span>
                    <TeamBlock code={code} size={22}/>
                    <div>
                      <div className="mono" style={{fontSize:12,fontWeight:700}}>{code}</div>
                      <div className="mono" style={{fontSize:8,color:'var(--ink-3)',marginTop:1}}>
                        {row.team.name.toUpperCase().slice(0,12)}
                      </div>
                    </div>
                    <span className="mono" style={{fontSize:11,textAlign:'center',color:'var(--ink-1)'}}>
                      {row.all?.played ?? 0}
                    </span>
                    <span className="mono" style={{fontSize:11,textAlign:'center',color:'var(--ink-1)'}}>
                      {row.all?.win ?? 0}
                    </span>
                    <span className="mono" style={{fontSize:11,textAlign:'center',color:'var(--ink-2)'}}>
                      {row.all?.draw ?? 0}
                    </span>
                    <span className="mono" style={{fontSize:11,textAlign:'center',color:'var(--ink-2)'}}>
                      {row.all?.lose ?? 0}
                    </span>
                    <span className="mono" style={{fontSize:10,textAlign:'center',
                      color:gd>0?'var(--acc-grn)':gd<0?'var(--acc-red)':'var(--ink-2)'}}>
                      {gd>0?'+':''}{gd}
                    </span>
                    <span className="chunky" style={{fontSize:18,textAlign:'right',
                      color:'var(--ink-0)'}}>{row.points}</span>
                  </div>
                );
              })}
            </HudCorners>
          </div>

          {/* Legend */}
          <div style={{padding:'12px 16px'}}>
            {[
              {c:'var(--acc-grn)',t:'TOP 2 · DIRECT TO ROUND OF 32'},
              {c:'oklch(0.72 0.14 85)',t:'3RD PLACE · BEST 8 ADVANCE'},
              {c:'var(--ink-3)',t:'ELIMINATED'},
            ].map((l,i) => (
              <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:7}}>
                <span style={{width:2,height:12,background:l.c,flexShrink:0}}/>
                <span className="mono caps" style={{fontSize:9,color:'var(--ink-2)',letterSpacing:'0.1em'}}>
                  {l.t}
                </span>
              </div>
            ))}
          </div>
        </>
      )}
      <div style={{height:16}}/>
    </div>
  );
}

// PREDICT SCREEN
// ══════════════════════════════════════════════════════════════════════════════
function PredictScreen({ matches, username, roomCode }) {
  const [preds, setPreds] = useState(() => JSON.parse(localStorage.getItem('wc26_preds')||'{}'));
  const [inputs, setInputs] = useState({});

  const predictable = matches.filter(m =>
    ['NS','1H','2H','HT','ET','BT','P','FT','AET','PEN'].includes(m.fixture.status.short)
  );

  const savePred = (fid) => {
    const inp = inputs[fid] || {};
    if (inp.home === undefined || inp.away === undefined) return;
    const np = {...preds, [fid]:{home:inp.home, away:inp.away, ts:Date.now()}};
    setPreds(np);
    localStorage.setItem('wc26_preds', JSON.stringify(np));
  };

  const setInp = (fid, side, val) => {
    const v = Math.max(0, Math.min(20, parseInt(val)||0));
    setInputs(p => ({...p, [fid]:{...(p[fid]||{}),[side]:v}}));
  };

  const getResult = (m, pred) => {
    const ah = m.goals.home, aa = m.goals.away;
    if (ah === null || ah === undefined) return null;
    if (pred.home === ah && pred.away === aa) return {label:'EXACT +3',cls:'var(--acc-grn)',pts:3};
    const rr = ah>aa?'H':ah<aa?'A':'D';
    const pr = pred.home>pred.away?'H':pred.home<pred.away?'A':'D';
    if (rr===pr) return {label:'WINNER +1',cls:'oklch(0.72 0.14 85)',pts:1};
    return {label:'WRONG +0',cls:'var(--acc-red)',pts:0};
  };

  return (
    <div className="screen-enter screen-scroll">
      <div style={{padding:`calc(var(--safe-top) + 16px) 16px 12px`,
        borderBottom:'1px solid var(--line)',background:'var(--bg-1)',
        position:'sticky',top:0,zIndex:20}}>
        <div className="mono caps" style={{fontSize:9,color:'var(--ink-3)',letterSpacing:'0.18em'}}>
          SCORE PREDICTOR
        </div>
        <div className="chunky" style={{fontSize:28,marginTop:4,letterSpacing:'-0.04em'}}>
          PREDICTIONS
        </div>
      </div>

      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--line)',
        fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-2)',lineHeight:1.8}}>
        <span style={{color:'var(--acc-grn)',fontWeight:700}}>●</span> EXACT SCORE = 3 PTS&nbsp;&nbsp;
        <span style={{color:'oklch(0.72 0.14 85)',fontWeight:700}}>●</span> CORRECT WINNER = 1 PT&nbsp;&nbsp;
        <span style={{color:'var(--acc-red)',fontWeight:700}}>●</span> WRONG = 0 PTS
      </div>

      {predictable.length === 0 && <div className="spinner"/>}

      {predictable.map(m => {
        const fid = m.fixture.id;
        const pred = preds[fid];
        const isNS = m.fixture.status.short === 'NS';
        const isFT = isFTStatus(m.fixture.status.short);
        const result = pred && !isNS ? getResult(m, pred) : null;
        const inp = inputs[fid] || {};
        const hCode = teamCode(m.teams.home.name);
        const aCode = teamCode(m.teams.away.name);

        return (
          <div key={fid} style={{borderBottom:'1px solid var(--line)',padding:'14px 16px'}}>
            {/* Match header */}
            <div style={{display:'flex',justifyContent:'space-between',
              alignItems:'center',marginBottom:12}}>
              <span className="mono caps" style={{fontSize:9,color:'var(--ink-3)',letterSpacing:'0.12em'}}>
                {m.league.round?.replace('Group Stage - ','GS ')?.replace('Group Stage','GS') || ''}
              </span>
              <span className="mono" style={{fontSize:9,color:'var(--ink-3)'}}>
                {isNS ? `KO ${fmtKO(m.fixture.date)} · ${fmtDateShort(m.fixture.date)}`
                  : m.fixture.status.short}
              </span>
            </div>

            {/* Teams + score input */}
            <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',
              alignItems:'center',gap:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <TeamBlock code={hCode} size={28}/>
                <div>
                  <div className="mono" style={{fontSize:13,fontWeight:700}}>{hCode}</div>
                  <div className="mono" style={{fontSize:9,color:'var(--ink-3)'}}>{m.teams.home.name.slice(0,10).toUpperCase()}</div>
                </div>
              </div>

              {/* Score area */}
              {!pred && isNS ? (
                <div style={{display:'flex',alignItems:'center',gap:6}}>
                  <input type="number" min="0" max="20"
                    style={{width:44,height:44,background:'var(--bg-3)',
                      border:`1px solid ${inp.home!==undefined?'var(--acc-red)':'var(--line-strong)'}`,
                      color:'var(--ink-0)',fontFamily:'var(--f-mono)',fontWeight:700,
                      fontSize:22,textAlign:'center',outline:'none'}}
                    value={inp.home??''}
                    onChange={e => setInp(fid,'home',e.target.value)}
                    placeholder="0"/>
                  <span className="mono" style={{color:'var(--ink-3)',fontSize:18}}>–</span>
                  <input type="number" min="0" max="20"
                    style={{width:44,height:44,background:'var(--bg-3)',
                      border:`1px solid ${inp.away!==undefined?'var(--acc-red)':'var(--line-strong)'}`,
                      color:'var(--ink-0)',fontFamily:'var(--f-mono)',fontWeight:700,
                      fontSize:22,textAlign:'center',outline:'none'}}
                    value={inp.away??''}
                    onChange={e => setInp(fid,'away',e.target.value)}
                    placeholder="0"/>
                </div>
              ) : (
                <div style={{textAlign:'center'}}>
                  {isFT && (
                    <div className="mono" style={{fontSize:9,color:'var(--ink-3)',marginBottom:2,letterSpacing:'0.1em'}}>
                      ACTUAL {m.goals.home}–{m.goals.away}
                    </div>
                  )}
                  <div className="chunky" style={{fontSize:28,
                    color:pred?'var(--ink-0)':'var(--ink-3)'}}>
                    {pred ? `${pred.home}–${pred.away}` : `${m.goals.home??'?'}–${m.goals.away??'?'}`}
                  </div>
                  {result && (
                    <div className="mono caps" style={{fontSize:9,fontWeight:700,
                      color:result.cls,letterSpacing:'0.1em',marginTop:4}}>
                      {result.label}
                    </div>
                  )}
                </div>
              )}

              <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'flex-end'}}>
                <div style={{textAlign:'right'}}>
                  <div className="mono" style={{fontSize:13,fontWeight:700}}>{aCode}</div>
                  <div className="mono" style={{fontSize:9,color:'var(--ink-3)'}}>{m.teams.away.name.slice(0,10).toUpperCase()}</div>
                </div>
                <TeamBlock code={aCode} size={28}/>
              </div>
            </div>

            {/* Lock button */}
            {!pred && isNS && (
              <div style={{marginTop:12}}>
                <button className="btn-primary"
                  disabled={inp.home===undefined||inp.away===undefined}
                  onClick={() => savePred(fid)}
                  style={{fontSize:11,padding:'9px',letterSpacing:'0.14em'}}>
                  LOCK IN PREDICTION 🔒
                </button>
              </div>
            )}
            {pred && isNS && (
              <div className="mono caps" style={{marginTop:10,fontSize:9,
                color:'var(--acc-grn)',letterSpacing:'0.12em'}}>
                ✓ LOCKED: {pred.home}–{pred.away}
              </div>
            )}
          </div>
        );
      })}
      <div style={{height:16}}/>
    </div>
  );
}

// BATTLE SCREEN (Polls + Call It)
// ══════════════════════════════════════════════════════════════════════════════
const POLLS = [
  {id:'p1',q:'Who wins the 2026 World Cup?',opts:['Brazil','France','Argentina','Other']},
  {id:'p2',q:'Tournament top scorer?',opts:['Mbappe','Vinicius Jr','Bellingham','Other']},
  {id:'p3',q:'Best match of the group stage?',opts:['BRA vs ARG','FRA vs ENG','ESP vs GER','Other']},
  {id:'p4',q:'Biggest upset of the tournament?',opts:['Already happened','Group stage','R16','QF+']},
];

function BattleScreen({ matches, username }) {
  const [section, setSection] = useState('POLLS');
  const [votes, setVotes] = useState(() => JSON.parse(localStorage.getItem('wc26_votes')||'{}'));
  const [localTallies, setLocalTallies] = useState({});
  const [callIt, setCallIt] = useState(() => JSON.parse(localStorage.getItem('wc26_callit')||'{}'));

  const live = matches.filter(m => isLiveStatus(m.fixture.status.short));

  const vote = (pollId, opt) => {
    if (votes[pollId]) return;
    const nv = {...votes,[pollId]:opt};
    setVotes(nv);
    localStorage.setItem('wc26_votes', JSON.stringify(nv));
    setLocalTallies(t => {
      const pt = t[pollId] || {};
      return {...t, [pollId]:{...pt, [opt]:(pt[opt]||0)+1}};
    });
  };

  const getTallies = (poll) => {
    const t = localTallies[poll.id] || {};
    const total = Object.values(t).reduce((a,b)=>a+b,0) || 1;
    return poll.opts.map(o => ({opt:o, count:t[o]||0, pct:Math.round(((t[o]||0)/total)*100)}));
  };

  const callGoal = (matchId, player) => {
    if (callIt[matchId]) return;
    const nc = {...callIt,[matchId]:player};
    setCallIt(nc);
    localStorage.setItem('wc26_callit', JSON.stringify(nc));
  };

  const DEMO_PLAYERS = ['Mbappe','Griezmann','Vinicius Jr','Rodrygo',
    'Messi','Di María','Bellingham','Kane','Gavi','Pedri'];

  return (
    <div className="screen-enter screen-scroll">
      <div style={{padding:`calc(var(--safe-top) + 16px) 16px 12px`,
        borderBottom:'1px solid var(--line)',background:'var(--bg-1)',
        position:'sticky',top:0,zIndex:20}}>
        <div className="mono caps" style={{fontSize:9,color:'var(--ink-3)',letterSpacing:'0.18em'}}>
          FRIENDS BATTLE
        </div>
        <div className="chunky" style={{fontSize:28,marginTop:4,letterSpacing:'-0.04em'}}>
          MATCH DAY
        </div>
      </div>

      {/* Section tabs */}
      <div style={{display:'flex',borderBottom:'1px solid var(--line)',
        background:'var(--bg-1)',position:'sticky',top:60,zIndex:19}}>
        {['POLLS','CALL IT','BOARD'].map(s => (
          <button key={s} onClick={() => setSection(s)}
            className="mono caps"
            style={{flex:1,background:'none',border:'none',
              borderBottom:section===s?'2px solid var(--acc-red)':'2px solid transparent',
              color:section===s?'var(--ink-0)':'var(--ink-2)',
              padding:'12px 0',fontSize:10,letterSpacing:'0.14em',
              fontWeight:section===s?700:500,cursor:'pointer'}}>
            {s}
          </button>
        ))}
      </div>

      {section === 'POLLS' && (
        <div style={{padding:'0 16px'}}>
          {POLLS.map(poll => {
            const voted = votes[poll.id];
            const tallies = getTallies(poll);
            const maxPct = Math.max(...tallies.map(t => t.pct));
            return (
              <div key={poll.id} style={{borderBottom:'1px solid var(--line)',padding:'16px 0'}}>
                <div style={{fontWeight:600,fontSize:15,marginBottom:12,lineHeight:1.4}}>
                  {poll.q}
                </div>
                {tallies.map(t => (
                  <div key={t.opt}
                    onClick={() => !voted && vote(poll.id, t.opt)}
                    style={{position:'relative',overflow:'hidden',
                      border:`1px solid ${voted&&t.opt===votes[poll.id]?'var(--acc-red)':'var(--line-strong)'}`,
                      padding:'10px 12px',marginBottom:6,
                      cursor:voted?'default':'pointer',
                      transition:'border-color .15s'}}>
                    <div style={{position:'absolute',left:0,top:0,bottom:0,
                      width:voted?`${t.pct}%`:'0%',
                      background:'color-mix(in oklch, var(--acc-red) 12%, transparent)',
                      transition:'width .6s ease'}}/>
                    <div style={{position:'relative',display:'flex',
                      justifyContent:'space-between',alignItems:'center'}}>
                      <span className="mono" style={{fontSize:13,fontWeight:500}}>{t.opt}</span>
                      {voted && (
                        <span className="mono" style={{fontSize:13,fontWeight:700,
                          color:t.pct===maxPct&&t.count>0?'var(--acc-grn)':'var(--ink-2)'}}>
                          {t.pct}%
                        </span>
                      )}
                    </div>
                  </div>
                ))}
                {!voted && (
                  <div className="mono" style={{fontSize:10,color:'var(--ink-3)',
                    letterSpacing:'0.1em',marginTop:4}}>TAP TO VOTE</div>
                )}
              </div>
            );
          })}
        </div>
      )}

      {section === 'CALL IT' && (
        <div style={{padding:'0 16px'}}>
          <div style={{padding:'14px 0',borderBottom:'1px solid var(--line)',
            fontFamily:'var(--f-mono)',fontSize:11,color:'var(--ink-2)',lineHeight:1.8}}>
            During a live match — tap a player to call the <span style={{color:'var(--acc-grn)',fontWeight:700}}>next goalscorer</span>. +2pts if correct!
          </div>

          {live.length === 0 ? (
            <div style={{padding:'40px 0',textAlign:'center'}}>
              <div className="mono caps" style={{fontSize:11,color:'var(--ink-3)',
                letterSpacing:'0.14em',lineHeight:2}}>
                NO LIVE MATCHES<br/>
                COME BACK DURING A GAME
              </div>
            </div>
          ) : (
            live.map(m => {
              const hCode = teamCode(m.teams.home.name);
              const aCode = teamCode(m.teams.away.name);
              const called = callIt[m.fixture.id];
              return (
                <div key={m.fixture.id} style={{paddingTop:16}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                    <LiveTag min={m.fixture.status.elapsed}/>
                    <span className="chunky" style={{fontSize:18}}>
                      {hCode} {m.goals.home}:{m.goals.away} {aCode}
                    </span>
                  </div>
                  {called ? (
                    <HudCorners style={{background:'var(--bg-2)',padding:'16px',textAlign:'center'}}>
                      <div className="mono caps" style={{fontSize:10,color:'var(--ink-3)',
                        letterSpacing:'0.14em',marginBottom:6}}>YOUR CALL</div>
                      <div className="chunky" style={{fontSize:26,color:'var(--acc-grn)'}}>{called}</div>
                      <div className="mono" style={{fontSize:10,color:'var(--ink-3)',marginTop:6}}>
                        FINGERS CROSSED ⚡
                      </div>
                    </HudCorners>
                  ) : (
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                      {DEMO_PLAYERS.map(p => (
                        <div key={p} onClick={() => callGoal(m.fixture.id, p)}
                          style={{border:'1px solid var(--line-strong)',
                            padding:'10px 12px',cursor:'pointer',
                            display:'flex',alignItems:'center',gap:8,
                            transition:'border-color .15s',background:'var(--bg-2)'}}>
                          <span style={{fontFamily:'var(--f-mono)',fontSize:9,
                            color:'var(--ink-3)',fontWeight:700}}>⚽</span>
                          <span style={{fontSize:13,fontWeight:500}}>{p}</span>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })
          )}
        </div>
      )}

      {section === 'BOARD' && (
        <Leaderboard matches={matches} username={username}
          preds={JSON.parse(localStorage.getItem('wc26_preds')||'{}')}/>
      )}

      <div style={{height:16}}/>
    </div>
  );
}

function Leaderboard({ matches, username, preds }) {
  const calcPts = (p) => {
    let pts = 0;
    Object.entries(p).forEach(([fid, pred]) => {
      const m = matches.find(x => String(x.fixture.id) === String(fid));
      if (!m || m.goals.home == null) return;
      if (pred.home === m.goals.home && pred.away === m.goals.away) { pts += 3; return; }
      const rr = m.goals.home > m.goals.away ? 'H' : m.goals.home < m.goals.away ? 'A' : 'D';
      const pr = pred.home > pred.away ? 'H' : pred.home < pred.away ? 'A' : 'D';
      if (rr === pr) pts += 1;
    });
    return pts;
  };

  const myPts = calcPts(preds);
  const board = [{name: username || 'You', pts: myPts, preds: Object.keys(preds).length}];

  return (
    <div style={{padding:'0 16px'}}>
      <SectionHeader num={1} label="LEADERBOARD"/>
      <div className="mono caps" style={{fontSize:10,color:'var(--ink-3)',
        letterSpacing:'0.1em',marginBottom:12,
        padding:'8px',background:'var(--bg-2)',
        border:'1px solid var(--line)'}}>
        ℹ FIREBASE NOT YET CONNECTED · SHOWING LOCAL SCORES ONLY
      </div>
      {board.map((row,i) => (
        <div key={row.name} style={{
          display:'flex',alignItems:'center',gap:12,padding:'12px',
          background:'color-mix(in oklch, var(--acc-red) 10%, transparent)',
          border:'1px solid color-mix(in oklch, var(--acc-red) 30%, transparent)',
          marginBottom:6}}>
          <div className="chunky" style={{fontSize:22,color:'var(--acc-grn)',width:28}}>
            {i===0?'01':i===1?'02':'0'+(i+1)}
          </div>
          <div style={{flex:1}}>
            <div style={{fontWeight:600,fontSize:15}}>{row.name} <span style={{color:'var(--ink-3)',fontSize:12}}>(you)</span></div>
            <div className="mono" style={{fontSize:10,color:'var(--ink-3)',marginTop:2,letterSpacing:'0.1em'}}>
              {row.preds} PREDICTION{row.preds!==1?'S':''}
            </div>
          </div>
          <div>
            <div className="chunky" style={{fontSize:28,color:'var(--acc-grn)'}}>{row.pts}</div>
            <div className="mono" style={{fontSize:9,color:'var(--ink-3)',textAlign:'right',letterSpacing:'0.1em'}}>PTS</div>
          </div>
        </div>
      ))}
    </div>
  );
}

                  <div style={{fontWeight:600,fontSize:14}}>{v.stadium}</div>
                  <div className="mono" style={{fontSize:10,color:'var(--ink-3)',
                    letterSpacing:'0.08em',marginTop:3}}>{v.city}</div>
                </div>
                <div className="chunky" style={{fontSize:16,color:'var(--ink-2)'}}>{v.cap}</div>
              </div>
            ))}
          </div>
        </div>
      ))}
      <div style={{height:16}}/>
    </div>
  );

  return (
    <div className="screen-enter screen-scroll">
      <div style={{padding:`calc(var(--safe-top) + 16px) 16px 12px`,
        borderBottom:'1px solid var(--line)',background:'var(--bg-1)',
        position:'sticky',top:0,zIndex:20}}>
        <div className="mono caps" style={{fontSize:9,color:'var(--ink-3)',letterSpacing:'0.18em'}}>
          WC26 APP
        </div>
        <div className="chunky" style={{fontSize:28,marginTop:4,letterSpacing:'-0.04em'}}>
          MORE
        </div>
      </div>

      {items.map((item,i) => (
        <div key={i}
          onClick={() => {
            if (item.label==='VENUES') setSection('VENUES');
            else if (item.label==='FORMAT') setSection('FORMAT');
            else if (item.label==='ROOM CODE') onCopyRoom();
            else if (item.label==='YOUR NAME') setShowNameEdit(true);
          }}
          style={{display:'grid',gridTemplateColumns:'32px 1fr 20px',
            gap:12,alignItems:'center',padding:'16px',
            borderBottom:'1px solid var(--line)',cursor:'pointer',
            transition:'background .15s',background:'transparent'}}
          onMouseEnter={e=>e.currentTarget.style.background='var(--bg-2)'}
          onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
          <span className="mono" style={{fontSize:11,color:'var(--ink-3)',fontWeight:700}}>
            {item.idx}
          </span>
          <div>
            <div className="mono caps" style={{fontSize:12,fontWeight:700,letterSpacing:'0.1em'}}>
              {item.label}
            </div>
            <div style={{fontSize:12,color:'var(--ink-2)',marginTop:3}}>{item.desc}</div>
          </div>
          <span style={{color:'var(--ink-3)',fontSize:14}}>›</span>
        </div>
      ))}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════════════════════════════
function getRoomCode() {
  let c = localStorage.getItem('wc26_room');
  if (!c) { c = Math.random().toString(36).slice(2,8).toUpperCase(); localStorage.setItem('wc26_room',c); }
  return c;
}

function App() {
  const [tab, setTab] = useState('home');
  const [matches, setMatches] = useState([]);
  const [selectedMatch, setSelectedMatch] = useState(null);
  const [username, setUsername] = useState(() => localStorage.getItem('wc26_user')||'');
  const [showSetup, setShowSetup] = useState(false);
  const [showNameEdit, setShowNameEdit] = useState(false);
  const [nameInput, setNameInput] = useState('');
  const [toast, setToast] = useState(null);
  const roomCode = getRoomCode();

  useEffect(() => {
    if (!username) setShowSetup(true);
  }, []);

  useEffect(() => {
    fetchMatches().then(setMatches).catch(console.error);
    const t = setInterval(() => fetchMatches().then(setMatches).catch(console.error), 30000);
    return () => clearInterval(t);
  }, []);

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2000);
  };

  const handleSetupDone = (name) => {
    setUsername(name);
    localStorage.setItem('wc26_user', name);
    setShowSetup(false);
  };

  const handleCopyRoom = async () => {
    const url = `${location.origin}${location.pathname}?room=${roomCode}`;
    try { await navigator.clipboard.writeText(url); showToast('LINK COPIED ✓'); }
    catch { showToast(`ROOM: ${roomCode}`); }
  };

  return (
    <>
      {/* Setup modal */}
      {showSetup && (
        <div className="modal-overlay">
          <div className="modal">
            <div className="mono caps" style={{fontSize:9,color:'var(--acc-red)',
              letterSpacing:'0.18em',marginBottom:8}}>FIFA WORLD CUP 2026</div>
            <h2>WELCOME TO WC26</h2>
            <p>Your tournament companion for live scores, predictions, and match battles with friends.</p>
            <input className="text-input" placeholder="Enter your name..."
              value={nameInput} onChange={e=>setNameInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&nameInput.trim()&&handleSetupDone(nameInput.trim())}
              autoFocus/>
            <button className="btn-primary"
              disabled={!nameInput.trim()}
              onClick={() => handleSetupDone(nameInput.trim())}>
              LET'S GO →
            </button>
          </div>
        </div>
      )}

      {/* Name edit modal */}
      {showNameEdit && (
        <div className="modal-overlay" onClick={() => setShowNameEdit(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <h2>YOUR NAME</h2>
            <p>Shown on the group leaderboard.</p>
            <input className="text-input" value={nameInput}
              onChange={e=>setNameInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&nameInput.trim()&&(handleSetupDone(nameInput.trim()),setShowNameEdit(false))}
              autoFocus/>
            <button className="btn-primary"
              onClick={() => { handleSetupDone(nameInput.trim()); setShowNameEdit(false); }}>
              SAVE
            </button>
          </div>
        </div>
      )}

      {toast && <div className="toast">{toast}</div>}

      {/* Main content */}
      <div style={{flex:1,overflow:'hidden',position:'relative'}}>
        {selectedMatch ? (
          <MatchDetailScreen match={selectedMatch} onBack={() => setSelectedMatch(null)}/>
        ) : tab === 'home' ? (
          <HomeScreen matches={matches} onMatchTap={setSelectedMatch}/>
        ) : tab === 'standings' ? (
          <StandingsScreen/>
        ) : tab === 'predict' ? (
          <PredictScreen matches={matches} username={username} roomCode={roomCode}/>
        ) : tab === 'battle' ? (
          <BattleScreen matches={matches} username={username}/>
        ) : (
          <MoreScreen username={username} setShowNameEdit={(v)=>{setNameInput(username);setShowNameEdit(v)}}
            roomCode={roomCode} onCopyRoom={handleCopyRoom}/>
        )}
      </div>

      {/* Bottom nav */}
      {!selectedMatch && (
        <nav className="bottom-nav">
          <div className="nav-tick-strip">
            {TABS.map(t => (
              <div key={t.k} className="nav-tick"
                style={{background:tab===t.k?'var(--acc-red)':'transparent'}}/>
            ))}
          </div>
          <div className="nav-tabs">
            {TABS.map(t => {
              const isActive = tab === t.k;
              const c = isActive ? 'var(--ink-0)' : 'var(--ink-3)';
              return (
                <button key={t.k} className="nav-btn" onClick={() => setTab(t.k)}>
                  {NAV_ICONS[t.k](c)}
                  <span className="nav-label" style={{color:c,fontWeight:isActive?700:500}}>{t.l}</span>
                  <span className="nav-idx" style={{color:isActive?'var(--acc-red)':'var(--ink-3)'}}>
                    0{t.idx}
                  </span>
                </button>
              );
            })}
          </div>
        </nav>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
